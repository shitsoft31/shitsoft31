name: Question
description: Ask a question or start a discussion
title: "[QUESTION] "
labels:
  - question

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reaching out! 💬

        Before asking, please check existing discussions and documentation if available.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to ask?
      placeholder: Explain your question clearly.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant background information.
      placeholder: |
        I am working on...
        I encountered this issue while...

  - type: textarea
    id: attempted
    attributes:
      label: What Have You Tried?
      description: Describe what you already attempted before asking.
      placeholder: |
        I tried...
        I checked...
