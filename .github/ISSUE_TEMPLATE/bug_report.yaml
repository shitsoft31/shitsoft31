name: Bug Report
description: Report a bug to help us improve
title: "[BUG] "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! 🚀

        Please provide as much information as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run command...
        2. Open file...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, version, runtime, compiler, etc.
      placeholder: Ubuntu 24.04, Python 3.13, GCC 15

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Add any useful logs or screenshots.
